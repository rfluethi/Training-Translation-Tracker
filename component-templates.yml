# Wenn ein Item KEIN GitHub-Issue hat, bekommen alle hier gelisteten
# Komponenten den Status "open" und werden so im Tracker angezeigt.
# Sobald ein Issue da ist, gewinnt dessen Status-Tabelle.
#
# Validierung gegen schemas/component-templates.schema.json

