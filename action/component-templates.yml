# Komponenten-Definition: Icons (zentral) und Default-Mengen pro Item-Typ.
#
# `icons` listet pro Komponenten-Name das SVG-`path d`-Attribut. Das Plugin
# baut um diesen Pfad das `<svg viewBox="0 0 24 24" aria-hidden="true">` herum.
# Quellsystem: Material Icons, 24x24 viewBox.
#
# `types` listet pro Item-Typ die Default-Komponenten (in Reihenfolge). Wenn
# ein Item KEIN GitHub-Issue hat, bekommen alle hier gelisteten Komponenten
# den Status "open" und werden so im Tracker angezeigt. Sobald ein Issue da
# ist, gewinnt dessen Status-Tabelle.
#
# Validierung gegen schemas/component-templates.schema.json.

