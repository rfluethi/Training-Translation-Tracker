# Scope der DACH-Übersetzung
#
# Eine Zeile pro URL — was im Tracker erscheinen soll.
# Items, die in scope.yml stehen, erscheinen immer.
# Items, die ein DACH-Issue haben aber NICHT in scope.yml stehen, landen in der Orphan-Gruppe.
#
# URL-Form muss kanonisch sein:
#   - lowercase, https
#   - mit Trailing-Slash
#   - ohne Query-Parameter, ohne Fragment
#   - ohne www.-Subdomäne
#
# Validierung gegen schemas/scope.schema.json
# Erweiterung: einfach weitere URLs anhängen.

locale: German
locale_short: de

