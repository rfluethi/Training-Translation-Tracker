name: Bug report
description: Something is not working as expected, either in the WordPress plugin or in the action.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much as possible. The more precise, the faster a fix.

  - type: dropdown
    id: component
    attributes:
      label: Which part is affected?
      options:
        - WordPress plugin (wp-plugin/)
        - GitHub Action (action/)
        - Both / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Shown in WP Admin under Plugins -> Training Translation Tracker, or in `training-translation-tracker.php`. For action bugs, supply the commit SHA.
      placeholder: "e.g. 0.2.3"
    validations:
      required: false

  - type: textarea
    id: what-happens
    attributes:
      label: What happens?
      description: What do you observe? Which error message appears, if any?
      placeholder: "When clicking on ... the following appears: ..."
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect?
      placeholder: "I expected ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If possible, list the steps 1, 2, 3 that trigger the bug.
      placeholder: |
        1. Install the plugin in WP
        2. Place the shortcode `[translation_tracker]` on a page
        3. Click on ...
        4. The error appears
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment (plugin bugs)
      description: WordPress version, PHP version, theme / page builder, browser. Only needed for plugin bugs.
      placeholder: |
        WordPress: 6.6
        PHP: 8.2
        Theme: Twenty Twenty-Four
        Browser: Firefox 125
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / browser console / screenshots
      description: For JS issues, the browser console output (F12 -> Console). For action errors, the action log excerpt. For layout issues, attach a screenshot.
      render: shell
    validations:
      required: false
