name: Feature request
description: An idea that would make the plugin or the action better.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe as concretely as possible what you want and why.

  - type: dropdown
    id: component
    attributes:
      label: Which part is affected?
      options:
        - WordPress plugin (wp-plugin/)
        - GitHub Action (action/)
        - Documentation
        - Something else
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Which problem does this solve?
      description: What is cumbersome or not possible today?
      placeholder: "Today I have to do ... for every section ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What could the feature look like? A sketch, mockup or example config are all fine.
      placeholder: "A new shortcode parameter `...` could ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / already tried
      description: Are there workarounds? What have you done so far?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links to similar implementations elsewhere, use-case examples.
    validations:
      required: false
