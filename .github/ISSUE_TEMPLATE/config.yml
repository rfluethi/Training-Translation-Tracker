# Issue template configuration.
#
# blank_issues_enabled: false means users must pick one of the templates.
# contact_links: extra links shown below the templates.

blank_issues_enabled: false
contact_links:
  - name: Create a translation issue for a specific lesson
    url: https://github.com/WordPress/Learn/issues/new
    about: >
      If you are a DACH team member and want to open a translation
      issue for a single lesson, that belongs in the WordPress/Learn
      repo, NOT here. For the issue template see this plugin's
      user guide: docs/User-Guide.md, section "Creating issues for
      new translations".
  - name: General questions / discussion
    url: https://make.wordpress.org/training/
    about: >
      Ask general questions about the Training team or about
      translation workflows on the Make.WordPress.org Training team
      blog.
