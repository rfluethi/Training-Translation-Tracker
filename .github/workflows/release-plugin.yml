name: Release Plugin

# Two triggers:
#
#   1. Push of a version tag like `v0.2.3`, which triggers an automatic release.
#      Workflow:  git tag v0.2.3 && git push --tags
#
#   2. Manual click in the GitHub Actions UI ("Run workflow"). Requires
#      a version input. Creates the tag itself if it does not exist yet.
#      Handy for beta releases without a local tag push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. "v0.2.3"). Must match the plugin header version.'
        required: true
        default: "v0.2.3"

# Creating a release requires write permissions on the repo.
permissions:
  contents: write

concurrency:
  group: release-plugin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for git operations (create the tag if needed)

      # ----------------------------------------------------------
      # Determine the version, from tag or input depending on trigger.
      # ----------------------------------------------------------
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          # Strip 'v' prefix, e.g. "v0.2.3" -> "0.2.3"
          BARE="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "bare=${BARE}" >> "$GITHUB_OUTPUT"
          # Beta detection: 0.x.y is treated as a prerelease.
          if [[ "$BARE" =~ ^0\. ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Building release: ${VERSION} (bare ${BARE})"

      # ----------------------------------------------------------
      # Verify the plugin header version against the tag, prevents
      # accidental releases with a non-bumped plugin version.
      # ----------------------------------------------------------
      - name: Verify plugin version matches tag
        run: |
          PLUGIN_VERSION=$(grep -E "^[[:space:]]*\*[[:space:]]*Version:" wp-plugin/training-translation-tracker.php | head -1 | sed -E 's/^.*Version:[[:space:]]+//;s/[[:space:]]*$//')
          TTT_CONST=$(grep -E "define\([[:space:]]*'TTT_VERSION'" wp-plugin/training-translation-tracker.php | sed -E "s/.*'TTT_VERSION'[[:space:]]*,[[:space:]]*'([^']+)'.*/\1/")
          STABLE_TAG=$(grep -E "^Stable tag:" wp-plugin/readme.txt | sed -E 's/^Stable tag:[[:space:]]*//;s/[[:space:]]*$//')

          echo "Plugin-Header Version: $PLUGIN_VERSION"
          echo "TTT_VERSION constant:  $TTT_CONST"
          echo "readme.txt Stable tag: $STABLE_TAG"
          echo "Expected (from tag):   ${{ steps.version.outputs.bare }}"

          MISMATCH=0
          if [ "$PLUGIN_VERSION" != "${{ steps.version.outputs.bare }}" ]; then
            echo "::error::Plugin header version ($PLUGIN_VERSION) != tag (${{ steps.version.outputs.bare }})"
            MISMATCH=1
          fi
          if [ "$TTT_CONST" != "${{ steps.version.outputs.bare }}" ]; then
            echo "::error::TTT_VERSION constant ($TTT_CONST) != tag (${{ steps.version.outputs.bare }})"
            MISMATCH=1
          fi
          if [ "$STABLE_TAG" != "${{ steps.version.outputs.bare }}" ]; then
            echo "::error::readme.txt Stable tag ($STABLE_TAG) != tag (${{ steps.version.outputs.bare }})"
            MISMATCH=1
          fi
          if [ "$MISMATCH" = "1" ]; then
            echo "::error::Version inconsistency. Bump the plugin files, commit, then re-tag."
            exit 1
          fi
          echo "All three version markers match."

      # ----------------------------------------------------------
      # Build the ZIP, using the same excludes as build-plugin-zip.sh.
      # The top-level folder inside the ZIP is named "training-translation-tracker"
      # (the plugin slug, important for WordPress).
      # ----------------------------------------------------------
      - name: Build plugin ZIP
        id: build
        run: |
          set -euo pipefail
          PLUGIN_SLUG="training-translation-tracker"
          ZIP_NAME="${PLUGIN_SLUG}-${{ steps.version.outputs.bare }}.zip"

          TMPDIR=$(mktemp -d)
          rsync -a \
            --exclude='.git/' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='.vscode/' \
            --exclude='.idea/' \
            --exclude='README.md' \
            --exclude='docs/' \
            --exclude='*.zip' \
            --exclude='build/' \
            --exclude='dist/' \
            wp-plugin/ "$TMPDIR/${PLUGIN_SLUG}/"

          ( cd "$TMPDIR" && zip -r -q "${ZIP_NAME}" "${PLUGIN_SLUG}" )
          mv "${TMPDIR}/${ZIP_NAME}" "${GITHUB_WORKSPACE}/${ZIP_NAME}"

          echo "Built: $(ls -la ${GITHUB_WORKSPACE}/${ZIP_NAME})"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

          # Sanity check: inspect ZIP contents.
          # `set +o pipefail` because `... | head -N` raises SIGPIPE as soon
          # as head has enough lines and closes. That terminates the upstream
          # `awk` and would otherwise make the step fail.
          echo "ZIP contents (top level):"
          set +o pipefail
          unzip -l "${GITHUB_WORKSPACE}/${ZIP_NAME}" | awk 'NR>3 && NF>=4 {print "  "$4}' | head -15
          set -o pipefail

      # ----------------------------------------------------------
      # Extract the changelog entry from readme.txt, becomes the
      # GitHub release description.
      # ----------------------------------------------------------
      - name: Extract changelog notes
        id: notes
        run: |
          BARE="${{ steps.version.outputs.bare }}"
          NOTES=$(awk -v ver="= ${BARE} =" '
            BEGIN { found=0 }
            $0 == ver { found=1; next }
            found && /^= / { exit }
            found { print }
          ' wp-plugin/readme.txt)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.version }}, see wp-plugin/readme.txt for details."
          fi

          # Multi-line output via heredoc (GitHub Actions convention).
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "## Install the plugin ZIP"
            echo ""
            echo "1. Download the ZIP below."
            echo "2. WordPress admin: Plugins -> Upload Plugin -> choose the ZIP."
            echo "3. Activate the plugin."
            echo ""
            echo "## Changelog ${{ steps.version.outputs.version }}"
            echo ""
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------
      # Create the release and attach the ZIP. softprops/action-gh-release
      # creates the tag if it does not exist yet (relevant for
      # workflow_dispatch). prerelease=true for 0.x.y versions.
      # ----------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: ${{ steps.build.outputs.zip_name }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' && 'true' || 'false' }}
