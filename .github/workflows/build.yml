name: Build tracker.json

# Auslöser — siehe Arbeitsplan §A.4.8
on:
  schedule:
    # Alle 12 Stunden. Intervall hier ändern, z.B.:
    #   "0 */6 * * *"  → alle 6 Stunden
    #   "0 6 * * *"    → täglich um 06:00 UTC
    - cron: "0 */12 * * *"

  workflow_dispatch:
    # Manueller Knopf in der GitHub-UI; GraphQL-Cost erscheint im Log.

  push:
    branches:
      - main
    paths:
      - "scope.yml"
      - "component-templates.yml"
      - "inventory-cache.json"
      - "src/**"
      - "schemas/**"
      - ".github/workflows/build.yml"
      - "requirements.txt"

# Workflow darf den data-Branch beschreiben, sonst nur lesen.
permissions:
  contents: write

# Mehrere Läufe für denselben Trigger zusammenfassen.
concurrency:
  group: build-tracker
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # für scope_version aus git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -q

      - name: Build tracker.json
        env:
          GH_PAT_PROJECT_READ: ${{ secrets.GH_PAT_PROJECT_READ }}
        run: |
          mkdir -p _output
          python -m src.build --output-dir _output

      - name: Show last-run.md in the log
        if: always()
        run: |
          if [ -f _output/last-run.md ]; then
            echo "----- last-run.md -----"
            cat _output/last-run.md
            echo "-----------------------"
          fi
          if [ -f _output/data-hygiene.md ]; then
            echo "----- data-hygiene.md -----"
            cat _output/data-hygiene.md
            echo "---------------------------"
          fi

      # ---------------------------------------------------------------
      # Output committen — force-push auf data-Branch (Arbeitsplan §A.4.6)
      # Bei Fehler im build-Schritt läuft dieser Schritt NICHT.
      # ---------------------------------------------------------------
      - name: Publish to data branch
        if: success()
        run: |
          set -euo pipefail

          # Frischer Worktree für den data-Branch
          rm -rf _data
          git worktree add --detach _data
          cd _data
          git checkout --orphan data-publish

          # Alles aus dem alten Branch entfernen, nur Output rüberkopieren
          git rm -rf . >/dev/null 2>&1 || true
          cp ../_output/tracker.json .
          cp ../_output/last-run.md .
          cp ../_output/data-hygiene.md .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.json last-run.md data-hygiene.md
          git commit -m "Update tracker.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Force-push: data-Branch trägt nur den letzten Stand
          git push --force origin HEAD:data
