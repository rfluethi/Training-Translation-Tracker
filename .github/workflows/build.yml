name: Build tracker.json

# Triggers, see Operations.md section 3.
on:
  schedule:
    # Every 12 hours. Adjust the interval here, for example:
    #   "0 */6 * * *"  -> every 6 hours
    #   "0 6 * * *"    -> daily at 06:00 UTC
    - cron: "0 */12 * * *"

  workflow_dispatch:
    # Manual button in the GitHub UI. GraphQL cost is written to the log.

  push:
    branches:
      - main
    # Only action-relevant paths trigger a build. Plugin changes
    # (wp-plugin/) do NOT trigger the action because they do not affect
    # tracker.json.
    paths:
      - "action/scope.yml"
      - "action/component-templates.yml"
      - "action/inventory-cache.json"
      - "action/src/**"
      - "action/schemas/**"
      - "action/requirements.txt"
      - ".github/workflows/build.yml"

# The workflow may write to the data branch; everything else is read-only.
permissions:
  contents: write

# Coalesce multiple runs for the same trigger.
concurrency:
  group: build-tracker
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # All action steps run inside the action/ subfolder (mono-repo layout).
    defaults:
      run:
        working-directory: action
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for scope_version derived from git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: action/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -q

      - name: Build tracker.json
        env:
          GH_PAT_PROJECT_READ: ${{ secrets.GH_PAT_PROJECT_READ }}
        run: |
          mkdir -p _output
          python -m src.build --output-dir _output

      - name: Show last-run.md in the log
        if: always()
        run: |
          if [ -f _output/last-run.md ]; then
            echo "----- last-run.md -----"
            cat _output/last-run.md
            echo "-----------------------"
          fi
          if [ -f _output/data-hygiene.md ]; then
            echo "----- data-hygiene.md -----"
            cat _output/data-hygiene.md
            echo "---------------------------"
          fi

      # ---------------------------------------------------------------
      # Commit the output, force-push to the data branch.
      # If the build step fails, this step does NOT run.
      # ---------------------------------------------------------------
      - name: Publish to data branch
        if: success()
        # The worktree operation must run from the repo root, not from action/.
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          # Fresh worktree for the data branch.
          rm -rf _data
          git worktree add --detach _data
          cd _data
          git checkout --orphan data-publish

          # Drop everything from the old branch, copy only the output across.
          git rm -rf . >/dev/null 2>&1 || true
          cp ../action/_output/tracker.json .
          cp ../action/_output/last-run.md .
          cp ../action/_output/data-hygiene.md .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.json last-run.md data-hygiene.md
          git commit -m "Update tracker.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Force push: the data branch only carries the latest state.
          git push --force origin HEAD:data
